<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Edit — Markdown 編輯器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5fa; --surface: #ffffff; --surface2: #ededf4;
    --border: #dddde8; --text: #1a1a2e; --muted: #7777a0;
    --accent: #5b5fc7; --accent-bg: rgba(91,95,199,.08);
    --editor-bg: #ffffff; --preview-bg: #fafafd; --code-bg: #f0f0f6;
    --toolbar-bg: rgba(255,255,255,.92); --shadow: 0 1px 3px rgba(0,0,0,.06);
    --radius: 8px;
  }
  .dark {
    --bg: #0e0e18; --surface: #181828; --surface2: #222236;
    --border: #2a2a42; --text: #dcdce8; --muted: #8080a4;
    --accent: #7b7ff0; --accent-bg: rgba(123,127,240,.1);
    --editor-bg: #111120; --preview-bg: #14142299; --code-bg: #1a1a2c;
    --toolbar-bg: rgba(24,24,40,.94); --shadow: 0 1px 3px rgba(0,0,0,.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column;
    transition: background .25s, color .25s;
  }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    background: var(--toolbar-bg); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px); z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }
  .logo-mark span { color: var(--accent); }
  .stats {
    font-size: 11px; color: var(--muted); background: var(--surface2);
    padding: 3px 10px; border-radius: 20px; white-space: nowrap;
  }
  .header-right { display: flex; align-items: center; gap: 3px; }

  /* ── Buttons ── */
  .btn {
    padding: 5px 12px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; font-family: inherit;
    background: transparent; color: var(--muted); transition: all .15s;
  }
  .btn:hover { color: var(--accent); background: var(--accent-bg); }
  .btn.active { background: var(--accent); color: #fff; }
  .btn.active:hover { background: var(--accent); filter: brightness(1.1); }
  .divider { width: 1px; height: 20px; background: var(--border); margin: 0 6px; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; gap: 1px; padding: 5px 16px; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--toolbar-bg); backdrop-filter: blur(14px);
  }
  .tool-btn {
    padding: 4px 10px; border: 1px solid transparent; border-radius: 5px;
    cursor: pointer; font-size: 13px; background: transparent;
    color: var(--muted); font-family: 'JetBrains Mono', monospace;
    transition: all .12s; line-height: 1.4;
  }
  .tool-btn:hover {
    background: var(--accent-bg); color: var(--accent);
    border-color: rgba(91,95,199,.2);
  }
  .tool-btn.toggle-on {
    background: var(--accent); color: #fff;
    border-color: var(--accent);
  }
  .tool-btn.toggle-on:hover { filter: brightness(1.1); }
  .tool-spacer { flex: 1; }
  .export-btn {
    padding: 4px 10px; border: none; border-radius: 5px; cursor: pointer;
    font-size: 12px; background: transparent; color: var(--muted);
    font-family: inherit; transition: color .15s;
  }
  .export-btn:hover { color: var(--accent); }

  /* ── Search/Replace bar ── */
  .search-bar {
    display: none; padding: 6px 16px; gap: 6px; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--toolbar-bg); backdrop-filter: blur(14px);
    font-size: 13px;
  }
  .search-bar.show { display: flex; }
  .search-bar input[type="text"] {
    padding: 5px 10px; border: 1px solid var(--border); border-radius: 5px;
    font-size: 13px; font-family: 'JetBrains Mono', monospace;
    background: var(--editor-bg); color: var(--text); outline: none;
    width: 220px; transition: border-color .15s;
  }
  .search-bar input[type="text"]:focus { border-color: var(--accent); }
  .search-bar input[type="text"]::placeholder { color: var(--muted); }
  .search-bar .s-btn {
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 5px;
    cursor: pointer; font-size: 12px; font-family: inherit;
    background: transparent; color: var(--muted); transition: all .15s;
  }
  .search-bar .s-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
  .search-bar .s-info { font-size: 11px; color: var(--muted); min-width: 60px; }
  .search-bar .s-close {
    padding: 4px 8px; border: none; border-radius: 5px; cursor: pointer;
    font-size: 15px; background: transparent; color: var(--muted);
    transition: color .15s; margin-left: auto;
  }
  .search-bar .s-close:hover { color: var(--accent); }
  .search-bar .s-toggle {
    padding: 3px 7px; border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; font-size: 11px; font-family: 'JetBrains Mono', monospace;
    background: transparent; color: var(--muted); transition: all .15s;
  }
  .search-bar .s-toggle.on {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .search-bar .s-toggle:hover:not(.on) { border-color: var(--accent); color: var(--accent); }
  .search-bar .s-row { display: flex; align-items: center; gap: 6px; width: 100%; }
  .search-bar .s-row:nth-child(2) { margin-top: 2px; }
  .search-bar .s-row.s-hidden { display: none; }

  /* ── Search highlight in preview ── */
  .preview-pane mark.search-hl {
    background: rgba(255, 213, 0, .4); color: inherit;
    border-radius: 2px; padding: 0 1px;
  }
  .preview-pane mark.search-hl-active {
    background: rgba(255, 140, 0, .6);
  }

  /* ── Main area ── */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* ── Editor ── */
  .editor-pane {
    flex: 1; display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
  }
  .editor-pane.full { border-right: none; }
  #editor {
    flex: 1; resize: none; border: none; outline: none;
    padding: 20px 24px; font-size: 14px; line-height: 1.75; tab-size: 2;
    font-family: 'JetBrains Mono', 'Noto Sans TC', monospace;
    background: var(--editor-bg); color: var(--text);
    caret-color: var(--accent);
  }
  #editor::placeholder { color: var(--muted); }

  /* ── Preview ── */
  .preview-pane {
    flex: 1; overflow: auto; padding: 20px 32px;
    background: var(--preview-bg); font-size: 15px; line-height: 1.8;
  }
  .preview-pane h1 {
    font-size: 1.85em; font-weight: 700; margin: 24px 0 12px;
    padding-bottom: 8px; border-bottom: 2px solid rgba(91,95,199,.25);
    letter-spacing: -.5px;
  }
  .preview-pane h2 { font-size: 1.45em; font-weight: 700; margin: 20px 0 10px; color: var(--accent); }
  .preview-pane h3 { font-size: 1.2em; font-weight: 600; margin: 16px 0 8px; }
  .preview-pane h4 { font-size: 1.08em; font-weight: 600; margin: 14px 0 6px; }
  .preview-pane p { margin: 8px 0; }
  .preview-pane ul, .preview-pane ol { padding-left: 24px; margin: 8px 0; }
  .preview-pane li { margin: 4px 0; }
  .preview-pane a {
    color: var(--accent); text-decoration: none;
    border-bottom: 1px solid rgba(91,95,199,.3);
    transition: border-color .2s;
  }
  .preview-pane a:hover { border-bottom-color: var(--accent); }
  .preview-pane blockquote {
    border-left: 4px solid var(--accent); margin: 12px 0; padding: 8px 16px;
    background: var(--accent-bg); border-radius: 0 8px 8px 0; color: var(--muted);
  }
  .preview-pane pre {
    background: var(--code-bg); padding: 16px 20px; border-radius: 10px;
    overflow-x: auto; margin: 12px 0; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; line-height: 1.6; border: 1px solid var(--border);
    white-space: pre;
  }
  .preview-pane pre code {
    background: none; padding: 0; border: none; font-size: inherit;
  }
  .preview-pane :not(pre) > code {
    background: var(--code-bg); padding: 2px 7px; border-radius: 5px;
    font-family: 'JetBrains Mono', monospace; font-size: .88em;
    border: 1px solid var(--border);
  }
  .preview-pane table { border-collapse: collapse; width: 100%; margin: 12px 0; }
  .preview-pane th {
    background: var(--accent-bg); font-weight: 600; text-align: left;
    padding: 10px 14px; border: 1px solid var(--border); color: var(--accent);
  }
  .preview-pane td { padding: 8px 14px; border: 1px solid var(--border); }
  .preview-pane tr:hover td { background: var(--accent-bg); }
  .preview-pane hr { border: none; height: 2px; background: var(--border); margin: 24px 0; }
  .preview-pane del { color: var(--muted); }
  .preview-pane .task { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .preview-pane .task input { accent-color: var(--accent); width: 16px; height: 16px; }
  .preview-pane img { max-width: 100%; border-radius: 6px; border: 1px solid var(--border); margin: 8px 0; }

  .hidden { display: none !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Drop overlay ── */
  .drop-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(91,95,199,.12); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0; transition: opacity .2s;
  }
  .drop-overlay.show { opacity: 1; }
  .drop-overlay div {
    padding: 24px 40px; border-radius: 16px;
    background: var(--surface); border: 2px dashed var(--accent);
    font-size: 18px; font-weight: 600; color: var(--accent);
    box-shadow: 0 8px 32px rgba(0,0,0,.12);
  }

  @media (max-width: 640px) {
    .preview-pane { padding: 16px !important; }
    .stats { display: none; }
  }
</style>
</head>
<body>

<!-- Drop overlay -->
<div class="drop-overlay" id="dropOverlay"><div>📄 放開以載入 .md 檔案</div></div>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-mark"><span>⬢</span> MD Edit</div>
    <div class="stats" id="stats">0 字元 · 0 詞 · 0 行</div>
  </div>
  <div class="header-right">
    <button class="btn" data-view="edit" onclick="setView('edit')">✎ 編輯</button>
    <button class="btn active" data-view="split" onclick="setView('split')">◫ 分割</button>
    <button class="btn" data-view="preview" onclick="setView('preview')">◉ 預覽</button>
    <div class="divider"></div>
    <button class="btn" id="themeBtn" onclick="toggleTheme()" title="切換深色/淺色">🌙</button>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar" id="toolbar">
  <button class="tool-btn" onclick="ins('# ','')">H₁</button>
  <button class="tool-btn" onclick="ins('## ','')">H₂</button>
  <button class="tool-btn" onclick="ins('### ','')">H₃</button>
  <button class="tool-btn" style="font-weight:800" onclick="ins('**','**')">B</button>
  <button class="tool-btn" style="font-style:italic" onclick="ins('*','*')">I</button>
  <button class="tool-btn" style="text-decoration:line-through" onclick="ins('~~','~~')">S</button>
  <button class="tool-btn" onclick="ins('`','`')">&lt;/&gt;</button>
  <button class="tool-btn" onclick="ins('[','](url)')">🔗</button>
  <button class="tool-btn" onclick="ins('- ','')">☰</button>
  <button class="tool-btn" onclick="ins('> ','')">❝</button>
  <button class="tool-btn" onclick="ins('\n---\n','')">—</button>
  <div class="divider"></div>
  <button class="tool-btn" id="noOlBtn" onclick="toggleNoOl()" title="停用數字列表解析（專利模式）">1.⃠</button>
  <button class="tool-btn" onclick="toggleSearch(true)" title="搜尋取代 (Ctrl+H)">⌕</button>
  <input type="file" id="fileInput" accept=".md,.markdown,.txt" hidden>
  <div class="tool-spacer"></div>
  <button class="export-btn" onclick="newFile()">📄 新增</button>
  <button class="export-btn" onclick="openFile()">📂 開啟</button>
  <div class="divider"></div>
  <button class="export-btn" onclick="downloadMd()">⬇ .md</button>
  <button class="export-btn" onclick="downloadHtml()">⬇ .html</button>
  <button class="export-btn" onclick="copyHtml()">📋 HTML</button>
</div>

<!-- Search/Replace bar -->
<div class="search-bar" id="searchBar">
  <div class="s-row">
    <input type="text" id="searchInput" placeholder="搜尋…" autocomplete="off" spellcheck="false">
    <button class="s-toggle" id="sCaseBtn" onclick="toggleCase()" onmousedown="event.preventDefault()" title="區分大小寫">Aa</button>
    <button class="s-toggle" id="sRegexBtn" onclick="toggleRegex()" onmousedown="event.preventDefault()" title="正規表示式">.*</button>
    <span class="s-info" id="searchInfo"></span>
    <button class="s-btn" onclick="searchPrev()" onmousedown="event.preventDefault()">▲</button>
    <button class="s-btn" onclick="searchNext()" onmousedown="event.preventDefault()">▼</button>
    <button class="s-close" onclick="closeSearch()">✕</button>
  </div>
  <div class="s-row" id="replaceRow">
    <input type="text" id="replaceInput" placeholder="取代…" autocomplete="off" spellcheck="false">
    <button class="s-btn" onclick="replaceCurrent()" onmousedown="event.preventDefault()">取代</button>
    <button class="s-btn" onclick="replaceAll()" onmousedown="event.preventDefault()">全部取代</button>
  </div>
</div>

<!-- Main -->
<div class="main" id="main">
  <div class="editor-pane" id="editorPane">
    <textarea id="editor" placeholder="在這裡輸入 Markdown..." spellcheck="false"></textarea>
  </div>
  <div class="preview-pane" id="preview"></div>
</div>

<!-- markdown-it CDN (primary parser) -->
<script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>

<script>
// ── Parser setup ──
let md = null;
let noOl = true; // 預設開啟：停用有序列表解析（適合專利文件）

if (window.markdownit) {
  md = window.markdownit({ html: true, breaks: false, linkify: true, typographer: false });
}

// Preprocess: escape "N." at line start so markdown-it won't create <ol>
function escapeOrderedList(src) {
  return src.replace(/^(\d+)[．.]\s/gm, '$1&#46; ');
}

// Fallback hand-written parser (offline / CDN fail)
function fallbackParseMd(src) {
  let h = src;
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const esc = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').trimEnd();
    return `<pre data-lang="${lang}"><code>${esc}</code></pre>`;
  });
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2"/>');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  h = h.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
  h = h.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
  h = h.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
  h = h.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');
  h = h.replace(/^---$/gm, '<hr/>');
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/~~(.+?)~~/g, '<del>$1</del>');
  h = h.replace(/^>\s+(.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.replace(/^[\-\*]\s\[x\]\s+(.+)$/gm, '<div class="task"><input type="checkbox" checked disabled/><span>$1</span></div>');
  h = h.replace(/^[\-\*]\s\[\s?\]\s+(.+)$/gm, '<div class="task"><input type="checkbox" disabled/><span>$1</span></div>');
  h = h.replace(/^[\-\*]\s+(.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  if (!noOl) {
    h = h.replace(/^\d+\.\s+(.+)$/gm, '<oli>$1</oli>');
    h = h.replace(/((?:<oli>.*<\/oli>\n?)+)/g, m =>
      '<ol>' + m.replace(/<\/?oli>/g, t => t.replace('oli','li')) + '</ol>');
  }
  h = h.replace(/^(\|.+\|)\n(\|[\s\-:|]+\|)\n((?:\|.+\|\n?)+)/gm, (_, hdr, _a, body) => {
    const hc = hdr.split('|').filter(c=>c.trim());
    const rows = body.trim().split('\n');
    let t = '<table><thead><tr>';
    hc.forEach(c => t += `<th>${c.trim()}</th>`);
    t += '</tr></thead><tbody>';
    rows.forEach(r => {
      const cells = r.split('|').filter(c=>c.trim());
      t += '<tr>'; cells.forEach(c => t += `<td>${c.trim()}</td>`); t += '</tr>';
    });
    return t + '</tbody></table>';
  });
  h = h.replace(/^(?!<[a-z/])((?!<).+)$/gm, '<p>$1</p>');
  h = h.replace(/<p>(<(?:h[1-6]|ul|ol|li|blockquote|pre|hr|table|div))/g,'$1');
  h = h.replace(/(<\/(?:h[1-6]|ul|ol|li|blockquote|pre|hr|table|div)>)<\/p>/g,'$1');
  return h;
}

function parseMd(src) {
  if (md) {
    const processed = noOl ? escapeOrderedList(src) : src;
    return md.render(processed);
  }
  return fallbackParseMd(src);
}

// ── State ──
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const editorPane = document.getElementById('editorPane');
const statsEl = document.getElementById('stats');
let currentView = 'split';
let isDark = false;

// ── Sample content ──
editor.value = `# Markdown Editor ✨

歡迎使用 MD Edit！左邊編輯，右邊即時預覽。

## 功能

- **即時預覽** — 打字同步渲染
- *斜體*、**粗體**、***粗斜體***、~~刪除線~~
- [超連結](https://example.com)

## 程式碼

行內：\`console.log("Hello")\`

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}
\`\`\`

## 表格

| 功能 | 狀態 | 備註 |
|------|------|------|
| 標題 | ✅ | h1–h6 |
| 列表 | ✅ | 有序 & 無序 |
| 表格 | ✅ | 基本表格 |

## 待辦

- [x] 建立編輯器
- [x] 即時預覽
- [ ] 匯出 HTML
- [ ] 深色模式

> 💡 快捷鍵：Ctrl+B 粗體、Ctrl+I 斜體、Ctrl+K 連結、Ctrl+F 搜尋、Ctrl+H 搜尋取代、Ctrl+O 開檔、Ctrl+S 存檔

---

拖放 .md 檔案到視窗即可載入。享受寫作吧 🚀`;

// ── Render ──
function render() {
  preview.innerHTML = parseMd(editor.value);
  updateStats();
  if (searchBar.classList.contains('show') && searchInput.value) highlightPreview();
  try { localStorage.setItem('md-edit-content', editor.value); } catch(e) {}
}

function updateStats() {
  const t = editor.value;
  const stripped = t.replace(/[#*`~\[\]()>|\-]/g,'').trim();
  const cjk = (stripped.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g)||[]).length;
  const eng = stripped.split(/\s+/).filter(w => w && !/[\u4e00-\u9fff]/.test(w)).length;
  const lines = t.split('\n').length;
  statsEl.textContent = `${t.length} 字元 · ${cjk+eng} 詞 · ${lines} 行`;
}

// ── View switching ──
function setView(v) {
  currentView = v;
  document.querySelectorAll('[data-view]').forEach(b => {
    b.classList.toggle('active', b.dataset.view === v);
  });
  editorPane.classList.toggle('hidden', v === 'preview');
  editorPane.classList.toggle('full', v === 'edit');
  preview.classList.toggle('hidden', v === 'edit');
  editorPane.style.borderRight = v === 'split' ? '1px solid var(--border)' : 'none';
}

// ── Theme ──
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
  try { localStorage.setItem('md-edit-dark', isDark ? '1' : '0'); } catch(e) {}
}

// ── No-OL toggle ──
function toggleNoOl() {
  noOl = !noOl;
  document.getElementById('noOlBtn').classList.toggle('toggle-on', noOl);
  try { localStorage.setItem('md-edit-no-ol', noOl ? '1' : '0'); } catch(e) {}
  render();
  showToast(noOl ? '已停用數字列表（專利模式）' : '已啟用數字列表');
}

// ── Search / Replace ──
const searchBar = document.getElementById('searchBar');
const searchInput = document.getElementById('searchInput');
const replaceInput = document.getElementById('replaceInput');
const searchInfo = document.getElementById('searchInfo');
let sCase = false, sRegex = false, sMatches = [], sIdx = -1;

function toggleSearch(withReplace) {
  const visible = searchBar.classList.contains('show');
  const replaceRow = document.getElementById('replaceRow');
  if (!visible) {
    searchBar.classList.add('show');
    replaceRow.classList.toggle('s-hidden', !withReplace);
    // Pre-fill with selection
    const sel = editor.value.substring(editor.selectionStart, editor.selectionEnd);
    if (sel && sel.length < 200 && !sel.includes('\n')) searchInput.value = sel;
    searchInput.focus();
    searchInput.select();
    doSearch();
  } else {
    // If already open, toggle replace row visibility or just re-focus
    if (withReplace) replaceRow.classList.remove('s-hidden');
    searchInput.focus();
    searchInput.select();
  }
}

function closeSearch() {
  searchBar.classList.remove('show');
  sMatches = []; sIdx = -1;
  searchInfo.textContent = '';
  clearPreviewHighlights();
  editor.focus();
}

function toggleCase() { sCase = !sCase; document.getElementById('sCaseBtn').classList.toggle('on', sCase); doSearch(); }
function toggleRegex() { sRegex = !sRegex; document.getElementById('sRegexBtn').classList.toggle('on', sRegex); doSearch(); }

function doSearch() {
  const q = searchInput.value;
  sMatches = []; sIdx = -1;
  if (!q) { searchInfo.textContent = ''; clearPreviewHighlights(); return; }

  try {
    const flags = sCase ? 'g' : 'gi';
    const re = sRegex ? new RegExp(q, flags) : new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags);
    let m;
    while ((m = re.exec(editor.value)) !== null) {
      sMatches.push({ start: m.index, end: m.index + m[0].length });
      if (m[0].length === 0) re.lastIndex++; // prevent infinite loop on zero-width match
    }
  } catch(e) {
    searchInfo.textContent = '正規式錯誤';
    return;
  }

  if (sMatches.length === 0) {
    searchInfo.textContent = '0 筆';
    clearPreviewHighlights();
    return;
  }

  // Find nearest match from cursor
  const cursor = editor.selectionStart;
  sIdx = sMatches.findIndex(m => m.start >= cursor);
  if (sIdx === -1) sIdx = 0;
  highlightMatch(false);
  highlightPreview();
}

function highlightMatch(focusEditor = true) {
  if (sMatches.length === 0 || sIdx < 0) return;
  const m = sMatches[sIdx];
  searchInfo.textContent = `${sIdx + 1} / ${sMatches.length}`;

  // Scroll editor to show match area
  const linesBefore = editor.value.substring(0, m.start).split('\n').length;
  const totalLines = editor.value.split('\n').length;
  const targetScroll = Math.max(0,
    ((linesBefore - 1) / totalLines) * editor.scrollHeight - editor.clientHeight / 3
  );
  editor.scrollTop = targetScroll;

  // Only steal focus & select when navigating (▲▼ / Enter), not while typing in search
  if (focusEditor) {
    editor.focus({ preventScroll: true });
    requestAnimationFrame(() => {
      editor.setSelectionRange(m.start, m.end);
    });
  }
}

// ── Preview highlight ──
function clearPreviewHighlights() {
  preview.querySelectorAll('mark.search-hl, mark.search-hl-active').forEach(m => {
    m.replaceWith(document.createTextNode(m.textContent));
  });
  preview.normalize();
}

function highlightPreview() {
  clearPreviewHighlights();
  const q = searchInput.value;
  if (!q) return;

  let re;
  try {
    const flags = sCase ? 'g' : 'gi';
    re = sRegex ? new RegExp(q, flags) : new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags);
  } catch(e) { return; }

  // Walk all text nodes in preview
  const walker = document.createTreeWalker(preview, NodeFilter.SHOW_TEXT);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);

  nodes.forEach(node => {
    // Skip pre/code blocks
    if (node.parentElement && node.parentElement.closest('pre')) return;
    const text = node.textContent;
    re.lastIndex = 0;
    if (!re.test(text)) return;
    re.lastIndex = 0;

    const frag = document.createDocumentFragment();
    let last = 0, match;
    while ((match = re.exec(text)) !== null) {
      if (match.index > last) frag.appendChild(document.createTextNode(text.substring(last, match.index)));
      const mark = document.createElement('mark');
      mark.className = 'search-hl';
      mark.textContent = match[0];
      frag.appendChild(mark);
      last = re.lastIndex;
      if (match[0].length === 0) re.lastIndex++;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.substring(last)));
    node.replaceWith(frag);
  });
}

function searchNext() {
  if (sMatches.length === 0) { doSearch(); return; }
  sIdx = (sIdx + 1) % sMatches.length;
  highlightMatch();
}

function searchPrev() {
  if (sMatches.length === 0) { doSearch(); return; }
  sIdx = (sIdx - 1 + sMatches.length) % sMatches.length;
  highlightMatch();
}

function replaceCurrent() {
  if (sMatches.length === 0 || sIdx < 0) return;
  const m = sMatches[sIdx];
  const r = replaceInput.value;
  editor.value = editor.value.substring(0, m.start) + r + editor.value.substring(m.end);
  // Adjust cursor
  editor.selectionStart = editor.selectionEnd = m.start + r.length;
  render();
  doSearch();
  if (sMatches.length > 0) {
    // Stay at same index or wrap
    if (sIdx >= sMatches.length) sIdx = 0;
    highlightMatch();
  }
}

function replaceAll() {
  const q = searchInput.value;
  const r = replaceInput.value;
  if (!q) return;
  try {
    const flags = sCase ? 'g' : 'gi';
    const re = sRegex ? new RegExp(q, flags) : new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags);
    const count = (editor.value.match(re) || []).length;
    editor.value = editor.value.replace(re, r);
    render();
    doSearch();
    showToast(`已取代 ${count} 筆`);
  } catch(e) {
    showToast('正規式錯誤');
  }
}

// Live search on input
searchInput.addEventListener('input', doSearch);

// Search bar keyboard
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeSearch(); e.preventDefault(); }
  if (e.key === 'Enter' && !e.shiftKey) { searchNext(); e.preventDefault(); }
  if (e.key === 'Enter' && e.shiftKey) { searchPrev(); e.preventDefault(); }
});
replaceInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeSearch(); e.preventDefault(); }
  if (e.key === 'Enter') { replaceCurrent(); e.preventDefault(); }
});

// ── Insert markdown ──
function ins(prefix, suffix) {
  const s = editor.selectionStart, e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || '文字';
  editor.value = editor.value.substring(0, s) + prefix + sel + suffix + editor.value.substring(e);
  editor.focus();
  editor.selectionStart = s + prefix.length;
  editor.selectionEnd = s + prefix.length + sel.length;
  render();
}

// ── Keyboard shortcuts (editor) ──
editor.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'b') { e.preventDefault(); ins('**','**'); }
    if (e.key === 'i') { e.preventDefault(); ins('*','*'); }
    if (e.key === 'k') { e.preventDefault(); ins('[','](url)'); }
    if (e.key === 's') { e.preventDefault(); downloadMd(); }
    if (e.key === 'o') { e.preventDefault(); openFile(); }
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart;
    editor.value = editor.value.substring(0,s) + '  ' + editor.value.substring(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = s + 2;
    render();
  }
  if (e.key === 'F3' && !e.ctrlKey) { e.preventDefault(); e.shiftKey ? searchPrev() : searchNext(); }
});

// ── Global shortcuts (Ctrl+F / Ctrl+H / F3 / Esc) ──
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    toggleSearch(false);
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'h') {
    e.preventDefault();
    toggleSearch(true);
  }
  if (e.key === 'Escape' && searchBar.classList.contains('show')) {
    closeSearch();
  }
  // F3 works globally (search box, replace box, editor, anywhere)
  if (e.key === 'F3' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    if (searchBar.classList.contains('show')) {
      e.shiftKey ? searchPrev() : searchNext();
    }
  }
});

// ── Sync scroll ──
editor.addEventListener('scroll', () => {
  if (currentView !== 'split') return;
  const ratio = editor.scrollTop / (editor.scrollHeight - editor.clientHeight || 1);
  preview.scrollTop = ratio * (preview.scrollHeight - preview.clientHeight);
});

// ── New file ──
function newFile() {
  if (editor.value.trim() && !confirm('目前內容尚未儲存，確定要開新文件嗎？')) return;
  editor.value = '';
  render();
  editor.focus();
  showToast('已開新文件');
}

// ── Open file ──
function openFile() {
  document.getElementById('fileInput').click();
}

const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    editor.value = ev.target.result;
    render();
    showToast(`已開啟 ${file.name}`);
  };
  reader.onerror = () => showToast('檔案讀取失敗');
  reader.readAsText(file, 'utf-8');
  fileInput.value = '';
});

// ── Export ──
// Clean up &#46; entities injected by escapeOrderedList() so exported HTML has real dots
function cleanExport(html) { return html.replace(/&#46;/g, '.'); }

function downloadMd() {
  dl(editor.value, 'document.md', 'text/markdown');
}
function downloadHtml() {
  const body = cleanExport(parseMd(editor.value));
  const full = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Markdown Export</title>
<style>body{font-family:-apple-system,'Noto Sans TC',sans-serif;max-width:800px;margin:40px auto;padding:0 20px;line-height:1.8;color:#1a1a2e}
pre{background:#f4f4f8;padding:16px;border-radius:8px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:13px}
pre code{background:none;padding:0;border:none}
code{background:#f4f4f8;padding:2px 6px;border-radius:4px;font-size:.9em}
table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px 12px;text-align:left}th{background:#f8f8fc}
blockquote{border-left:4px solid #5b5fc7;margin:0;padding:8px 16px;background:#f8f8fc}
a{color:#5b5fc7}</style></head><body>${body}</body></html>`;
  dl(full, 'document.html', 'text/html');
}
function copyHtml() {
  navigator.clipboard.writeText(cleanExport(parseMd(editor.value))).then(() => showToast('HTML 已複製！'));
}
function dl(content, name, type) {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
  showToast(`已下載 ${name}`);
}
function showToast(msg) {
  const d = document.createElement('div');
  d.textContent = msg;
  Object.assign(d.style, {
    position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',
    padding:'8px 20px',borderRadius:'8px',fontSize:'13px',fontWeight:'500',
    background:'var(--accent)',color:'#fff',zIndex:'999',
    animation:'fadeInUp .3s ease',boxShadow:'0 4px 16px rgba(0,0,0,.15)'
  });
  document.body.appendChild(d);
  setTimeout(() => { d.style.opacity = '0'; d.style.transition = 'opacity .3s'; setTimeout(() => d.remove(), 300); }, 1800);
}

// ── Drag & drop .md file ──
const overlay = document.getElementById('dropOverlay');
let dragCounter = 0;

['dragenter', 'dragover'].forEach(evt => {
  document.addEventListener(evt, e => {
    e.preventDefault(); e.stopPropagation();
    dragCounter++;
    overlay.classList.add('show');
  });
});

document.addEventListener('dragleave', e => {
  e.preventDefault(); e.stopPropagation();
  dragCounter--;
  if (dragCounter <= 0) { overlay.classList.remove('show'); dragCounter = 0; }
});

document.addEventListener('drop', e => {
  e.preventDefault(); e.stopPropagation();
  dragCounter = 0; overlay.classList.remove('show');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const ok = file.name.endsWith('.md') || file.name.endsWith('.markdown') || file.name.endsWith('.txt');
  if (!ok) { showToast('僅支援 Markdown / TXT'); return; }
  const reader = new FileReader();
  reader.onload = ev => { editor.value = ev.target.result; render(); showToast(`已載入 ${file.name}`); };
  reader.onerror = () => showToast('檔案讀取失敗');
  reader.readAsText(file, 'utf-8');
});

// ── Init ──
(function init() {
  try {
    const saved = localStorage.getItem('md-edit-content');
    if (saved) editor.value = saved;
    if (localStorage.getItem('md-edit-dark') === '1') toggleTheme();
    const savedNoOl = localStorage.getItem('md-edit-no-ol');
    if (savedNoOl !== null) noOl = savedNoOl === '1';
  } catch(e) {}
  document.getElementById('noOlBtn').classList.toggle('toggle-on', noOl);
  editor.addEventListener('input', render);
  render();
})();
</script>

<style>
@keyframes fadeInUp {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
</style>
